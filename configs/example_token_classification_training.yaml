paths:
  assemblies:
    HG38: /sci/archive/michall/roeizucker/reference_genome/hg38.fa
    MM10: /sci/archive/michall/roeizucker/reference_genome/mm10.fa
  generetor_cache_dir: /sci/archive/michall/roeizucker/huggingface_modles_cache/datasets/generator
  train_dataset_path: /cs/usr/roeizucker/new_storage/jupyter_notebooks/Tom_Hope_Project/refactored_code/notebooks/results/Z000000T3_token_cls_seq_5400_train
  eval_dataset_path: /cs/usr/roeizucker/new_storage/jupyter_notebooks/Tom_Hope_Project/refactored_code/notebooks/results/Z000000T3_token_cls_seq_5400_test
  output_dir: /cs/usr/roeizucker/new_storage/jupyter_notebooks/Tom_Hope_Project/refactored_code/notebooks/results/Z000000T3_token_cls_model_test

task:
  task_type: cpg_training
  analysis_name: Z000000T3_token_cls_model_test
  top_rows: 16

testing_params:
  test_mode: false

random_state: 42
verbose: true

model:
  model_name: nucleotide-transformer-2.5b-multi-species
  model_repo: InstaDeepAI
  model_type: classification_analysis
  blank_label: -100
  use_lora: false
  freeze_model: false
  num_labels: 3

train:
  load_best_model_at_end: false
  num_train_epochs: 1
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  learning_rate: 1.0e-06
  metric_for_best_model: mcc
  save_stratagy: "no"
  lora_over_finetuned: false
  load_dataset_to_memory: true
  min_number_of_cpg_sites: -1
  max_grad_norm: 1
  number_of_steps: -1
  save_total_limit: -1
  add_epoch_end_save_callback: false
  add_epoch_end_prediction: false
  save_at_end: false
  continue_from_last: false
