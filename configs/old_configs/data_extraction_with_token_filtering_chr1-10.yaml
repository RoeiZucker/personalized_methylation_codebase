paths:
  assemblies:
    HG38: /sci/archive/michall/roeizucker/reference_genome/hg38.fa
    MM10: /sci/archive/michall/roeizucker/reference_genome/mm10.fa
  generetor_cache_dir: /sci/archive/michall/roeizucker/huggingface_modles_cache/datasets/generator
  raw_data_path: /sci/archive/michall/roeizucker/downloaded_datasets/GSM5652233_Liver-Hepatocytes-Z000000R3.hg38.bigwig
  intermediate_train_data_path: /sci/archive/michall/roeizucker/huggingface_datasets_dir/temp_train2025-10-1313:43:15.974316abcdyo.csv
  intermediate_test_data_path: /sci/archive/michall/roeizucker/huggingface_datasets_dir/temp_test2025-10-1313:43:15.974316abcdyo.csv
  hf_dataset_train_path: /sci/archive/michall/roeizucker/huggingface_datasets_dir/R3_chr1-10_kmer_sample_filtration_train_other
  hf_dataset_test_path: /sci/archive/michall/roeizucker/huggingface_datasets_dir/R3_chr1-10_kmer_sample_filtration_test_other
  variant_file_path: /sci/archive/michall/roeizucker/huggingface_datasets_dir/R3_per_varaint_variability_after_HPO_lr_06_bs_2_chr1-10.csv

variant_filtering :
  use_variant_filtering : false
  variant_filtering_upper_bound : -1
  variant_filtering_lower_bound : -1
task:
  type: cpg_extraction
  assembly: HG38
  value_column: methyl_rate
  input_mode: intermediate_input
  seq_size: 5400
  test_size: 0.2
  blank_label: -100
  use_fasta: true
  shuffle: true
  chromosomes:
  - chr1
  - chr2
  - chr3
  - chr4
  - chr5
  - chr6
  - chr7
  - chr8
  - chr9
  - chr10
  tokenizer_name: InstaDeepAI/nucleotide-transformer-2.5b-multi-species
  output_preprocessed_data: false
  output_intermediate_data: false
  output_hf_dataset: true
  window_type: standart_no_overlap
  train_test_seperation: kmer_sample_filtration
  clear_generator_cache: true
testing_params:
  test_mode: false
  raw_data_top_rows : -1
random_state: 42
verbose: true
