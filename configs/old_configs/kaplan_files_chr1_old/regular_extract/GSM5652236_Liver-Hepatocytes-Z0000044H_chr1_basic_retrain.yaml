task:
  task_type: cpg_retraining
  analysis_name: GSM5652236_Liver-Hepatocytes-Z0000044H_chr1_retrain
  sub_task: evaluate_multiple_checkpoints
  sequence_col: sequence
  label_col: labels
  top_rows: -1
testing_params:
  test_mode: false
