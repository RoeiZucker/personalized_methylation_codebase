paths:
  assemblies:
    HG38: /sci/archive/michall/roeizucker/reference_genome/hg38.fa
    MM10: /sci/archive/michall/roeizucker/reference_genome/mm10.fa
  generetor_cache_dir: /sci/archive/michall/roeizucker/huggingface_modles_cache/datasets/generator
  train_dataset_path:
  - /sci/archive/michall/roeizucker/huggingface_datasets_dir/GSM5652236_Liver-Hepatocytes-Z0000044H_chr1_basic_train
  output_dir: /sci/archive/michall/roeizucker/trained_huggingfacce_models_location/kaplan_files_chr1_GSM5652236_Liver-Hepatocytes-Z0000044H_chr1_retrain
