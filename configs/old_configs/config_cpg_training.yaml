  # test_mode: true
  # instcombine_rows_to_multiple_instances_format_path:  '/sci/archive/michall/roeizucker/Tom_project/created_datasets/inst_file.df'
  # add_borders_to_multiple_instance_format_df_path: '/sci/archive/michall/roeizucker/Tom_project/created_datasets/inst_file_with_borders.df'
  # create_labels_formultiple_instance_format_df_path: '/sci/archive/michall/roeizucker/Tom_project/created_datasets/inst_file_with_labels.df'
  # add_sequence_formultiple_instance_format_df_path: '/sci/archive/michall/roeizucker/Tom_project/created_datasets/inst_file_with_seq.df'
  # result_df_path: '/sci/archive/michall/roeizucker/Tom_project/created_datasets/inst_file_with_seq_and_labels.df'

task:
  task_type: "cpg_training"
  # sub_task: "evaluate_single_checkpoint"
  analysis_name : "cpg_test_delete_me_1"
  assembly:       "HG38"
  test_dataset:   "fill here"
  train_dataset:   false
  sequence_col: "sequence"   # name of the field in your Dataset
  label_col:    "labels"     # name of the field holding per‐base label lists
  top_rows: -1  # number of rows to evaluate, set to -1 for all rows

model:
  model_name: "nucleotide-transformer-2.5b-multi-species"
  model_repo: "InstaDeepAI" 
  model_type: "regression_analysis"  # or "CLASSIFICATION_ANALYSIS
  blank_label: -100
  use_lora : True
  freeze_model : True
  num_labels: 1  # for regression, set to 1; for classification, set to the number of classes

train:
  load_best_model_at_end : false
  num_train_epochs : 4
  per_device_train_batch_size : 2
  per_device_eval_batch_size : 2
  learning_rate : 1e-5
  metric_for_best_model: "mse"
  save_stratagy : "steps"
  number_of_steps : 5000
  save_total_limit : 3
  add_epoch_end_save_callback : true
  save_at_end : false
  continue_from_last : true


testing_params:
  test_mode: false


evaluation:
  batch_size:     16
  device:         "cuda"
  num_workers:    4
  threshold:      0.5
  metrics:
    - accuracy
    - precision
    - recall
    - f1
    - roc_auc
    - pr_auc
    - mcc

  # Output filenames are now provided under paths

verbose: true
random_state: 42
