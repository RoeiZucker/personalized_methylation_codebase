paths:
  assemblies:
    HG38: /sci/archive/michall/roeizucker/reference_genome/hg38.fa
    MM10: /sci/archive/michall/roeizucker/reference_genome/mm10.fa
  generetor_cache_dir: /sci/archive/michall/roeizucker/huggingface_modles_cache/datasets/generator
  train_dataset_path:
  - /sci/archive/michall/roeizucker/huggingface_datasets_dir/T3_pretrain_test_no_grad_norm_without_fp_or_variability_change_with_-1_train
  - /sci/archive/michall/roeizucker/huggingface_datasets_dir/3Q_pretrain_test_no_grad_norm_without_fp_or_variability_change_with_-1_train
  output_dir: /sci/archive/michall/roeizucker/trained_huggingfacce_models_location/R3_pretrain_test_no_grad_norm_without_fp_or_variability_change_with_-1
task:
  task_type: cpg_training
  analysis_name: R3_pretrain_test_no_grad_norm_without_fp_or_variability_change_with_-1
  top_rows: 2000
testing_params:
  test_mode: false
random_state: 42
verbose: true
model:
  model_name: nucleotide-transformer-2.5b-multi-species
  model_repo: InstaDeepAI
  model_type: regression_analysis
  blank_label: -100
  use_lora: false
  freeze_mode: false
  num_labels: 1
train:
  load_best_model_at_end: false
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  learning_rate: 1e-05
  metric_for_best_model: mse
  save_stratagy: steps
  number_of_steps: 500
  save_total_limit: 20
  add_epoch_end_save_callback: true
  save_at_end: false
  continue_from_last: true
